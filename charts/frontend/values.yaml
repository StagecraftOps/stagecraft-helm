namespace: stagecraft
nameOverride: ""

image:
  repository: yourregistry/stagecraft-frontend
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2
containerPort: 3000

service:
  enabled: true
  port: 80
  targetPort: 3000

# No AWS IAM needs — the frontend never calls an AWS API directly.
serviceAccount:
  create: true
  roleArn: ""

env:
  NODE_ENV: production
  # Empty string = relative URLs — frontend and API share one ALB domain via
  # path-based routing, so /api/v1/... resolves to the api service alongside it.
  NEXT_PUBLIC_API_URL: ""
  API_URL_INTERNAL: http://stagecraft-api/

livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  groupName: stagecraft
  host: stagecraft.example.com
  path: /
