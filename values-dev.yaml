# Dev overlay: single replica everywhere, dev-suffixed image tags, dev host.
# Usage: helm upgrade --install stagecraft . -f values.yaml -f values-dev.yaml

api:
  image:
    tag: dev
  replicaCount: 1
  ingress:
    host: dev.stagecraft.example.com

worker:
  image:
    tag: dev
  # Nested under the subchart's own "worker"/"consumer" process keys — see
  # charts/worker/values.yaml for what each field controls.
  worker:
    replicaCount: 1
  consumer:
    replicaCount: 1

webhook:
  image:
    tag: dev
  replicaCount: 1
  ingress:
    host: webhooks-dev.stagecraft.example.com

frontend:
  image:
    tag: dev
  replicaCount: 1
  ingress:
    host: dev.stagecraft.example.com

mcp:
  image:
    tag: dev
  replicaCount: 1
