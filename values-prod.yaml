# Prod overlay: image tag is a real release SHA, not "latest" — pass it via
# --set on deploy (e.g. --set api.image.tag=$GIT_SHA for each service, or
# override all five at once with a values file generated by CI).
# roleArn fields below must be filled in from `terraform output` in
# stagecraft-infra before this overlay is usable.
# Usage: helm upgrade --install stagecraft . -f values.yaml -f values-prod.yaml
#
# NOTE (temporary, no domain yet): all three ingresses share one ALB and are
# addressed by the ALB's own DNS name as the Host, since there's no Route53/ACM
# domain set up. Path routing on that single host: /api -> api (order 10),
# /webhooks -> webhook (order 20), / -> frontend catch-all (order 30). The api
# runs ENVIRONMENT=staging so its session cookie isn't Secure-only (we're on
# plain http). Swap host back to a real HTTPS domain and ENVIRONMENT=production
# once a domain + cert exist.

api:
  replicaCount: 3
  image:
    repository: yampss/stagecraft-api
    tag: latest
  serviceAccount:
    roleArn: "arn:aws:iam::870325637146:role/stagecraft-api"
  env:
    ENVIRONMENT: staging
    FRONTEND_URL: http://k8s-stagecraft-1de7e348b3-1960332100.us-east-1.elb.amazonaws.com
    GITHUB_REDIRECT_URI: http://k8s-stagecraft-1de7e348b3-1960332100.us-east-1.elb.amazonaws.com/api/auth/callback
  ingress:
    host: k8s-stagecraft-1de7e348b3-1960332100.us-east-1.elb.amazonaws.com

worker:
  image:
    repository: yampss/stagecraft-worker
    tag: latest
  serviceAccount:
    roleArn: "arn:aws:iam::870325637146:role/stagecraft-worker"
  worker:
    replicaCount: 3
  consumer:
    replicaCount: 2

webhook:
  replicaCount: 2
  image:
    repository: yampss/stagecraft-webhook
    tag: latest
  serviceAccount:
    roleArn: "arn:aws:iam::870325637146:role/stagecraft-webhook"
  ingress:
    host: k8s-stagecraft-1de7e348b3-1960332100.us-east-1.elb.amazonaws.com
    path: /webhooks

frontend:
  replicaCount: 3
  image:
    repository: yampss/stagecraft-frontend
    tag: latest
  ingress:
    host: k8s-stagecraft-1de7e348b3-1960332100.us-east-1.elb.amazonaws.com

mcp:
  # Single replica: the MCP server uses SSE (a long-lived /sse connection plus
  # separate /messages/ POSTs). Behind a round-robin ClusterIP, a 2nd replica
  # breaks session affinity — the POST hits the wrong pod and 404s. Keep at 1
  # until the Service has sessionAffinity or MCP moves to a stateless transport.
  replicaCount: 1
  image:
    repository: yampss/stagecraft-mcp
    tag: latest
