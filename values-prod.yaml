# Prod overlay: image tag is a real release SHA, not "latest" — pass it via
# --set on deploy (e.g. --set api.image.tag=$GIT_SHA for each service, or
# override all five at once with a values file generated by CI).
# roleArn fields below must be filled in from `terraform output` in
# stagecraft-infra before this overlay is usable.
# Usage: helm upgrade --install stagecraft . -f values.yaml -f values-prod.yaml

api:
  replicaCount: 3
  serviceAccount:
    roleArn: "arn:aws:iam::REPLACE_ME:role/stagecraft-api"
  ingress:
    host: stagecraft.example.com

worker:
  serviceAccount:
    roleArn: "arn:aws:iam::REPLACE_ME:role/stagecraft-worker"
  worker:
    replicaCount: 3
  consumer:
    replicaCount: 2

webhook:
  replicaCount: 2
  serviceAccount:
    roleArn: "arn:aws:iam::REPLACE_ME:role/stagecraft-webhook"
  ingress:
    host: webhooks.stagecraft.example.com

frontend:
  replicaCount: 3
  ingress:
    host: stagecraft.example.com

mcp:
  replicaCount: 2
